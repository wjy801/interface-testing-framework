name: "Test"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest allure-pytest requests PyYAML iniconfig jsonpath pymysql rsa

      - name: Start local server
        run: |
          python -m http.server 8000 >/tmp/test-server.log 2>&1 &
          sleep 2

      - name: Run minimal test
        run: CASE_TARGET=test_fastapi pytest -s test_api/case.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            temps
            reports
            logs
            /tmp/test-server.log
